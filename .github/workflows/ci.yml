name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs on PRs/feature branches to save minutes, but never on
  # main: every push to main must run to completion so each merged commit lands
  # with a full, green CI check instead of a cancelled (incomplete) one.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  backend:
    name: Backend — lint, type, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: entropia
          POSTGRES_PASSWORD: entropia
          POSTGRES_DB: entropia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U entropia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://entropia:entropia@localhost:5432/entropia
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras
      - name: Ruff (lint + format check)
        working-directory: backend
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Mypy
        working-directory: backend
        run: uv run mypy src
      - name: OpenAPI schema drift guard
        working-directory: backend
        # Regenerate the schema from the app and fail if docs/openapi.json is
        # stale (DB-free). Validity of the document is asserted by the contract
        # test suite. To fix a failure: `make openapi` and commit the snapshot.
        run: uv run python -m entropia.apps.api.openapi_export --check
      - name: Alembic migrations apply cleanly
        working-directory: backend
        run: uv run alembic upgrade head
      - name: Pytest (unit + contract + integration)
        working-directory: backend
        run: uv run pytest

  frontend:
    name: Frontend — lint, typecheck, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Test
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker — build images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build backend image
        run: docker build -t entropia-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t entropia-web:ci ./frontend
