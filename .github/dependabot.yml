version: 2

updates:
  # Backend — Python deps managed via uv (backend/pyproject.toml + uv.lock)
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      backend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Frontend — npm deps (frontend/package.json + package-lock.json)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      frontend-minor-patch:
        update-types:
          - "minor"
          - "patch"
    # Frontend toolchain majors (eslint, typescript, react, ...) have breaking
    # changes and interdependent peer requirements — they cannot be merged
    # piecemeal. Suppress automated major PRs; perform major upgrades as a
    # dedicated, manually-tested branch instead.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions — pin/patch workflow action versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(docker)"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(docker)"
