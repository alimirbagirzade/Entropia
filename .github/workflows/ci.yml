name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint, type, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: entropia
          POSTGRES_PASSWORD: entropia
          POSTGRES_DB: entropia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U entropia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://entropia:entropia@localhost:5432/entropia
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras
      - name: Ruff (lint + format check)
        working-directory: backend
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Mypy
        working-directory: backend
        run: uv run mypy src
      - name: Alembic migrations apply cleanly
        working-directory: backend
        run: uv run alembic upgrade head
      - name: Pytest (unit + contract + integration)
        working-directory: backend
        run: uv run pytest

  frontend:
    name: Frontend — lint, typecheck, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Test
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker — build images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t entropia-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t entropia-web:ci ./frontend
