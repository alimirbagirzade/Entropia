name: Bug report
description: Report a defect in the backend, frontend, or infra
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      multiple: true
      options:
        - Backend (FastAPI / commands / queries)
        - Backend (worker / dramatiq jobs)
        - Backend (database / migrations)
        - Frontend (React / pages)
        - Frontend (build / tooling)
        - Infra (Docker / CI)
        - Docs
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit / branch
      placeholder: e.g. main @ 8624f04
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      render: shell
    validations:
      required: false
