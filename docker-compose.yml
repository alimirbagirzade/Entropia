# =============================================================================
# Entropia V18 — local / first-production Docker Compose stack.
# Modular monolith: one backend image, many entrypoints (api + worker planes).
# Works identically on macOS, Windows (Docker Desktop) and Linux.
#   docker compose up -d --build
# =============================================================================

x-backend-build: &backend-build
  build:
    context: ./backend
    dockerfile: Dockerfile
  image: entropia-backend:local
  # Defaults to .env (the normal local stack). An isolated E2E run overrides this
  # with ENTROPIA_ENV_FILE=.env.e2e.<flow> so its containers read a hermetic env
  # (own AUTH_MODE + service token) without ever touching the user's real .env.
  env_file: ${ENTROPIA_ENV_FILE:-.env}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_healthy
  restart: unless-stopped

# Worker planes have no HTTP surface; dramatiq consumes from Redis. A live
# broker connection is the meaningful liveness signal — the container's PID 1
# IS the worker master, so a dead master already stops the container (caught by
# `restart:` + the acceptance state gate in scripts/acceptance.sh). This probe
# adds the "alive but cannot reach its broker" case on top of that.
x-worker-healthcheck: &worker-healthcheck
  healthcheck:
    test: ["CMD", "python", "-c", "import os,redis,sys; sys.exit(0 if redis.from_url(os.environ['REDIS_URL']).ping() else 1)"]
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 20s

# Runtime backend planes (api + every worker) need the schema migrated AND the
# baseline system identities/capabilities provisioned before they start. They
# depend on the `provision` one-shot, which itself depends on `migrate`, so the
# effective start order is postgres-healthy -> migrate -> provision -> plane.
# (`provision` transitively covers `migrate`; the redis/minio health gates are
# re-listed here because a service-level `depends_on` replaces the one inherited
# from *backend-build rather than merging with it.)
x-needs-provision: &needs-provision
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  minio:
    condition: service_healthy
  provision:
    condition: service_completed_successfully

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-entropia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-entropia}
      POSTGRES_DB: ${POSTGRES_DB:-entropia}
    ports:
      # Host side is parameterized so an isolated E2E project can pick a
      # non-colliding port and coexist with the user's normal stack.
      - "${PG_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-entropia} -d ${POSTGRES_DB:-entropia}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-entropia}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-entropia-secret}
    ports:
      - "${MINIO_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: ensure the artifact bucket exists, then exit.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${OBJECT_STORAGE_ACCESS_KEY:-entropia} ${OBJECT_STORAGE_SECRET_KEY:-entropia-secret} &&
      mc mb --ignore-existing local/${OBJECT_STORAGE_BUCKET:-entropia-artifacts} &&
      echo 'bucket ready';
      "
    restart: "no"

  # Runs Alembic migrations to head, then exits. Other services start after.
  migrate:
    <<: *backend-build
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  # Mode-aware, idempotent baseline provisioning one-shot (audit PROV-06). Runs
  # AFTER migrations and BEFORE any plane that needs system identities. In
  # session mode (the .env default) it ensures the required Agent/system
  # principal + baseline capability rows WITHOUT creating the credentialless
  # human Admin (that would permanently block first-Admin bootstrap); in dev
  # mode it also provisions the dev Admin fixture (SEED_DEV_ADMIN follows
  # AUTH_MODE). It seeds NO demo/user-owned domain data — all such data stays
  # behind explicit SEED_* flags. Idempotent, so it re-runs harmlessly on every
  # `up`. Only Postgres is required (identities + capabilities are DB-only), so
  # its depends_on intentionally omits redis/minio.
  provision:
    <<: *backend-build
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "entropia.apps.seed"]
    restart: "no"

  api:
    <<: *backend-build
    command: ["uvicorn", "entropia.apps.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    depends_on: *needs-provision
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/api/v1/health/live').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 6

  worker-default:
    <<: [*backend-build, *worker-healthcheck]
    depends_on: *needs-provision
    command: ["python", "-m", "entropia.apps.worker", "--queues", "default,maintenance"]

  worker-data:
    <<: [*backend-build, *worker-healthcheck]
    depends_on: *needs-provision
    command: ["python", "-m", "entropia.apps.worker", "--queues", "data"]

  worker-backtest:
    <<: [*backend-build, *worker-healthcheck]
    depends_on: *needs-provision
    command: ["python", "-m", "entropia.apps.worker", "--queues", "backtest"]

  worker-agent:
    <<: [*backend-build, *worker-healthcheck]
    depends_on: *needs-provision
    command: ["python", "-m", "entropia.apps.worker", "--queues", "agent,agent-high"]

  agent-coordinator:
    <<: [*backend-build, *worker-healthcheck]
    depends_on: *needs-provision
    command: ["python", "-m", "entropia.apps.agent_coordinator"]

  scheduler:
    <<: [*backend-build, *worker-healthcheck]
    depends_on: *needs-provision
    command: ["python", "-m", "entropia.apps.scheduler"]

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    image: entropia-web:local
    ports:
      - "${WEB_HOST_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      # F-08 (audit 22-Jul): use the IPv4 loopback literal, not "localhost".
      # In this container "localhost" can resolve to ::1 (IPv6) while nginx
      # listens on 0.0.0.0:80 (IPv4), so the probe failed and the container was
      # marked unhealthy even though the served page worked. 127.0.0.1 is
      # deterministic and address-family-safe.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  redisdata:
  miniodata:
